{% extends "doctor/main.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">

    <!-- Page Header -->
    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h2 class="page-title mb-1" style="font-weight: 700; color: #1a2744;">
                <i class="bi bi-plus-circle me-2 text-primary"></i>Record Expense
            </h2>
            <p class="text-muted small mb-0">Fill in the details to record a new clinic expense</p>
        </div>
        <a href="{% url 'expenses:expense_list' %}" class="btn btn-outline-secondary rounded-pill px-4" style="font-weight: 500;">
            <i class="bi bi-arrow-left me-1"></i> Back to Expenses
        </a>
    </div>

    <!-- Main Card -->
    <div class="card shadow-sm border-0" style="border-radius: 16px; background: #ffffff;">
        <div class="card-body p-4 p-md-5">
            <form method="post" action="{% url 'expenses:add_expense' %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                

                <h5 class="mb-4" style="color: #2c3e50; font-weight: 600; font-size: 1.1rem; border-bottom: 2px solid #f1f4f8; padding-bottom: 12px;">
                    Expense Details
                </h5>

                <div class="row g-4">
                    <!-- Title -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Expense Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" name="title" placeholder="e.g. Electricity Bill, Clinic Supplies" required style="border-radius: 10px; font-size: 0.95rem;">
                        </div>
                    </div>

                    <!-- Category -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Category <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <select class="form-select form-select-lg bg-light border-0" name="category" required style="border-radius: 10px 0 0 10px; font-size: 0.95rem;">
                                    <option value="" disabled selected>Select Category</option>
                                    <!-- Dynamic options will be rendered here -->
                                    {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                                <a href="{% url 'expenses:category_list' %}" class="btn btn-light border-0" style="background: #e2e8f0; border-radius: 0 10px 10px 0; display: flex; align-items: center;" title="Manage Categories">
                                    <i class="bi bi-gear-fill text-secondary"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Amount -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Amount (₹) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0" style="border-radius: 10px 0 0 10px; font-weight: 600;">₹</span>
                                <input type="number" step="0.01" class="form-control form-control-lg bg-light border-0" name="amount" placeholder="0.00" required style="border-radius: 0 10px 10px 0; font-size: 0.95rem;">
                            </div>
                        </div>
                    </div>

                    <!-- Date -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Expense Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control form-control-lg bg-light border-0" name="expense_date" required style="border-radius: 10px; font-size: 0.95rem;">
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Notes / Description</label>
                            <textarea class="form-control bg-light border-0" name="notes" rows="3" placeholder="Add any additional details here..." style="border-radius: 12px; font-size: 0.95rem; resize: none;"></textarea>
                        </div>
                    </div>

                    <!-- Attachment -->
                    <div class="col-12">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 600; color: #4a5568; font-size: 0.9rem;">Attachment / Invoice Receipt</label>
                            <div class="p-4 bg-light text-center border-0" style="border-radius: 12px; border: 2px dashed #cbd5e1 !important; position: relative;">
                                <i class="bi bi-cloud-arrow-up text-primary" style="font-size: 2rem;"></i>
                                <p class="mb-2 mt-2" style="font-size: 0.9rem; color: #64748b;">Drag and drop your file here, or click to browse</p>
                                <input type="file" name="attachment" class="form-control" style="opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 text-end">
                    <button type="reset" class="btn btn-light px-4 py-2 me-2 rounded-pill" style="font-weight: 600; color: #64748b;">Cancel</button>
                    <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow-sm" style="font-weight: 600;">
                        <i class="bi bi-save me-1"></i> Save Expense
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<style>
    .form-control:focus, .form-select:focus {
        box-shadow: none;
        background-color: #f8fafc !important;
        border: 1px solid #3b82f6 !important;
    }
</style>
{% endblock %}
