{% extends "doctor/main.html" %}
{% load static %}
{% block title %}Add Patient{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">
    <div class="patient-form-shell">
        <div class="page-header patient-form-header">
            <div>
                <h2 class="page-title mb-0">Add Patient</h2>
                <p class="page-subtitle">Create a new patient profile with basic contact details.</p>
            </div>

            <a href="{% url 'doctor:manage_patients' %}" class="patient-link-btn">
                Manage Patients
            </a>
        </div>

        <div class="patient-form-card">
            <form method="POST" class="patient-form-grid">
                {% csrf_token %}

                <div class="patient-field">
                    <label class="patient-label" for="patient-name">Patient Name</label>
                    <input id="patient-name" type="text" name="name" class="patient-input" placeholder="Enter patient name" required>
                </div>

                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="patient-age">Age</label>
                        <input id="patient-age" type="number" name="age" class="patient-input" placeholder="Enter age" required>
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="patient-gender">Gender</label>
                        <select id="patient-gender" name="gender" class="patient-input">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="patient-field">
                    <label class="patient-label" for="patient-phone">Phone</label>
                    <input id="patient-phone" type="text" name="phone" class="patient-input" placeholder="Enter phone number">
                </div>

                <div class="patient-field">
                    <label class="patient-label" for="patient-address">Address</label>
                    <textarea id="patient-address" name="address" class="patient-input patient-textarea" rows="4" placeholder="Enter address"></textarea>
                </div>

                <div class="patient-form-actions">
                    <button type="submit" class="patient-submit-btn">
                        <i class="bi bi-check2-circle"></i>
                        <span>Save Patient</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
