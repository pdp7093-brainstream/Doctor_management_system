{% extends "doctor/main.html" %}
{% load static %}
{% block title %}Add Patient{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">
    <div class="patient-form-shell">
        <div class="page-header patient-form-header">
            <div>
                <h2 class="page-title mb-0">Add Patient</h2>
                <p class="page-subtitle">Create a new patient profile with basic contact details.</p>
            </div>

            <a href="{% url 'doctor:manage_patients' %}" class="patient-link-btn">
                Manage Patients
            </a>
        </div>

        <div class="patient-form-card">
            <form method="POST" enctype="multipart/form-data" class="patient-form-grid">
                {% csrf_token %}


                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="patient-name">Full Name</label>
                        <input id="patient-name" type="text" name="name" class="patient-input"
                            placeholder="Enter full name" required>
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="patient-email">Email</label>
                        <input id="patient-email" type="email" name="email" class="patient-input"
                            placeholder="Enter email address" required>
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="patient-dob">Date of Birth</label>
                        <input id="patient-dob" type="date" name="dob" class="patient-input">
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="patient-gender">Gender</label>
                        <select id="patient-gender" name="gender" class="patient-input">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="patient-phone">Phone</label>
                        <input id="patient-phone" type="text" name="phone" class="patient-input"
                            placeholder="Enter phone number">
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="patient-blood-group">Blood Group</label>
                        <select id="patient-blood-group" name="bld_grop" class="patient-input">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>

                <div class="patient-field">
                    <label class="patient-label" for="patient-address">Address</label>
                    <textarea id="patient-address" name="address" class="patient-input patient-textarea" rows="4"
                        placeholder="Enter complete address"></textarea>
                </div>


                <div class="patient-form-actions">
                    <button type="submit" class="patient-submit-btn">
                        <i class="bi bi-check2-circle"></i>
                        <span>Save Patient</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
