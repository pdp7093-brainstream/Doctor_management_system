{% extends "doctor/main.html" %}
{% load static %}
{% block title %}Edit Medicine - Doctor Dashboard{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">
    <div class="patient-form-shell">
        <div class="page-header patient-form-header">
            <div>
                <h2 class="page-title mb-0">Edit Medicine</h2>
                <p class="page-subtitle">Update the details for {{ medicine.name }}.</p>
            </div>
            <a href="{% url 'doctor:manage_medicine' %}" class="patient-link-btn">
                Medicine Store
            </a>
        </div>

        <div class="patient-form-card">
            <form method="POST" action="{% url 'doctor:edit_medicine' medicine.pk %}" class="patient-form-grid">
                {% csrf_token %}

                <!-- Medicine Name -->
                <div class="patient-field">
                    <label class="patient-label" for="medicine-name">Medicine Name</label>
                    <input id="medicine-name" type="text" name="name" class="patient-input"
                        value="{{ medicine.name }}" required>
                </div>

                <!-- Stock & Price -->
                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-stock">Stock Quantity</label>
                        <input id="medicine-stock" type="number" name="stock" class="patient-input"
                            value="{{ medicine.stock }}" min="0" required>
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="medicine-price">Price (₹)</label>
                        <input id="medicine-price" type="number" name="price" class="patient-input"
                            value="{{ medicine.price }}" min="0" step="0.01" required>
                    </div>
                </div>

                <!-- Mfg. Date & Exp. Date -->
                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-mfg">Mfg. Date</label>
                        <input id="medicine-mfg" type="date" name="mfg_date" class="patient-input"
                            value="{{ medicine.mfg_date|date:'Y-m-d' }}" required>
                    </div>

                    <div class="patient-field">
                        <label class="patient-label" for="medicine-exp">Exp. Date</label>
                        <input id="medicine-exp" type="date" name="exp_date" class="patient-input"
                            value="{{ medicine.expiry_date|date:'Y-m-d' }}" required>
                    </div>
                </div>

                <!-- Actions -->
                <div class="patient-form-actions">
                    <button type="submit" class="patient-submit-btn">
                        <i class="bi bi-check2-circle"></i>
                        <span>Update Medicine</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
