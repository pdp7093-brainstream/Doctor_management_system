{% extends "doctor/main.html" %}
{% block title %}Clinic Settings{% endblock %}

{% block content %}
<main class="main-content" id="mainContent">
    <div class="page-header">
        <h2 class="page-title">Clinic Settings</h2>
    </div>

    <div class="container mt-4">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3">🏥 Clinic Settings</h4>

            <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Clinic Name</label>
                    <input type="text" name="clinic_name" class="form-control" value="{{ settings.clinic_name }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>GST Number</label>
                    <input type="text" name="gst_number" class="form-control" value="{{ settings.gst_number }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ settings.phone }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" value="{{ settings.email }}">
                </div>

                <div class="col-md-12 mb-3">
                    <label>Address</label>
                    <textarea name="address" class="form-control">{{ settings.address }}</textarea>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Opening Time</label>
                    <input type="time" name="opening_time" class="form-control" value="{{ settings.opening_time }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Closing Time</label>
                    <input type="time" name="closing_time" class="form-control" value="{{ settings.closing_time }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Lunch Start</label>
                    <input type="time" name="lunch_start" class="form-control" value="{{ settings.lunch_start }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Lunch End</label>
                    <input type="time" name="lunch_end" class="form-control" value="{{ settings.lunch_end }}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Clinic Logo</label>
                    <input type="file" name="clinic_logo" class="form-control">
                </div>

                <div class="col-md-12 mb-3">
                    <label>Footer Note</label>
                    <textarea name="footer_note" class="form-control">{{ settings.footer_note }}</textarea>
                </div>
            </div>

            <button class="btn btn-primary">Save Settings</button>
        </form>
        </div>
    </div>
</main>
{% endblock %}
