{% extends "doctor/main.html" %}
{% block title %}Manage Appointments{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
        <h2 class="page-title mb-0">Manage Appointments</h2>
        <a href="{% url 'appointment:add_appointment' %}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add Appointment
        </a>
    </div>

    <!-- FILTERS (live - no button) -->
    <div class="table-section mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-semibold">Search Patient</label>
                <input type="text" id="search" class="form-control" 
                       placeholder="Name or phone..." value="{{ search }}">
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Date</label>
                <input type="date" id="appointmentDate" class="form-control" 
                       value="{{ appointment_date }}">
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Status</label>
                <select id="appointmentStatus" class="form-select">
                    <option value="all"    {% if status == "all"       %}selected{% endif %}>All</option>
                    <option value="pending"    {% if status == "pending"   %}selected{% endif %}>Pending</option>
                    <option value="confirmed"  {% if status == "confirmed" %}selected{% endif %}>Confirmed</option>
                    <option value="cancelled"  {% if status == "cancelled" %}selected{% endif %}>Cancelled</option>
                    <option value="completed"  {% if status == "completed" %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <div class="col-md-2">
                <button id="clearBtn" class="btn btn-outline-secondary mt-4 w-100">Clear</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-section">
        <div style="overflow-x:auto;">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <!-- tbody + pagination partial se aayega -->
                {% include "doctor/appointments_table.html" %}
            </table>
        </div>

        <div id="paginationContainer">
            <!-- pagination partial se already render ho gaya upar -->
        </div>
    </div>
</main>

<script>
    const searchInput      = document.getElementById("search");
    const dateInput        = document.getElementById("appointmentDate");
    const statusInput      = document.getElementById("appointmentStatus");
    const clearBtn         = document.getElementById("clearBtn");

    let currentPage = 1;
    let debounceTimer;

    // ─── Main fetch function ───────────────────────────────────────────────
    function fetchAppointments(page = 1) {
        currentPage = page;

        const params = new URLSearchParams({
            search:           searchInput.value,
            appointment_date: dateInput.value,
            status:           statusInput.value,
            page:             page,
        });

        fetch(`/appointment/manage_appointments/?${params.toString()}`, {
            headers: { 'x-requested-with': 'XMLHttpRequest' }
        })
        .then(res => res.text())
        .then(html => {
            // partial HTML me tbody + pagination dono hain
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;

            // tbody replace
            const newTbody = wrapper.querySelector('#tableBody');
            const oldTbody = document.querySelector('#tableBody');
            if (newTbody && oldTbody) oldTbody.replaceWith(newTbody);

            // pagination replace
            const newPagination = wrapper.querySelector('#paginationWrapper');
            const oldPagination = document.querySelector('#paginationWrapper');
            if (newPagination && oldPagination) {
                oldPagination.replaceWith(newPagination);
            } else if (newPagination) {
                document.getElementById('paginationContainer').appendChild(newPagination);
            }

            // naye pagination links ko bind karo
            bindPaginationLinks();
        })
        .catch(err => console.error("Fetch error:", err));
    }

    // ─── Pagination links bind ─────────────────────────────────────────────
    function bindPaginationLinks() {
        document.querySelectorAll('.pagination-link').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const page = this.getAttribute('data-page');
                fetchAppointments(parseInt(page));
            });
        });
    }

    // ─── Debounce for search ───────────────────────────────────────────────
    function debounce(fn, delay = 350) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fn, delay);
    }

    // ─── Event listeners ──────────────────────────────────────────────────
    searchInput.addEventListener('input',  () => debounce(() => fetchAppointments(1)));
    dateInput.addEventListener('change',   () => fetchAppointments(1));
    statusInput.addEventListener('change', () => fetchAppointments(1));

    clearBtn.addEventListener('click', () => {
        searchInput.value  = '';
        dateInput.value    = '';
        statusInput.value  = 'all';
        fetchAppointments(1);
    });

    // ─── Page load pe pagination bind karo ───────────────────────────────
    bindPaginationLinks();
</script>
{% endblock %}
