{% extends "doctor/main.html" %}
{% block title %}Upload Old Data{% endblock %}
{% block content %}

<main class="main-content" id="mainContent">
    <div class="patient-form-shell">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h2 class="page-title mb-1">Upload Old Data</h2>
                <p class="text-muted small mb-0">Search for a patient and upload their old documents or records.</p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="card border-0 shadow-sm">
            <div class="card-header d-flex align-items-center gap-2" style="font-size:0.98rem; font-weight:700;">
                <i class="bi bi-file-earmark-arrow-up-fill"></i> Upload Document
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" novalidate class="needs-validation row g-3">
                    {% csrf_token %}

                    <!-- Patient Search Input -->
                    <div class="col-12">
                        <label for="patientSearch" class="form-label" style="font-size:0.85rem; font-weight:600;">
                            Search Patient <span class="text-danger">*</span>
                        </label>
                        <div class="position-relative">
                            <div class="input-group">
                                <input type="text" class="form-control" id="patientSearch"
                                    placeholder="Type patient name, phone, or email..." autocomplete="off">
                                <button class="btn btn-outline-secondary" type="button" id="clearBtn"
                                    style="display:none;" title="Clear selection">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                            <input type="hidden" id="patient_id" name="patient_id" required>
                            <input type="hidden" id="family_member_id" name="family_member_id">

                            <!-- Search Results Dropdown -->
                            <div class="search-results" id="searchResults"
                                style="display:none; position:absolute; top:100%; left:0; right:0; background:white; border:1px solid #ddd; border-top:none; border-radius:0 0 8px 8px; max-height:300px; overflow-y:auto; z-index:1000;">
                            </div>
                        </div>
                        <div class="invalid-feedback">Please select a patient.</div>

                        <!-- Selected Patient Display -->
                        <div id="selectedPatientDisplay"
                            style="margin-top:10px; padding:12px 15px; background:#e3f2fd; border:1px solid #90caf9; border-radius:6px; display:none; align-items:center; gap:10px;">
                            <div style="flex:1;">
                                <strong style="color:#1565c0;">✓ Selected:</strong>
                                <span id="selectedPatientName" style="color:#333; font-weight:500;"></span>
                            </div>
                            <button type="button" id="clearSelectionBtn" class="btn btn-sm btn-outline-danger"
                                style="margin:0;" title="Change patient selection">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>

                        <!-- Error Message -->
                        <div id="searchError"
                            style="margin-top:8px; padding:10px; background:#ffebee; color:#c62828; border-radius:6px; display:none; font-size:0.9rem;">
                        </div>
                    </div>

                    <!-- File Upload -->
                    <div class="col-12 mt-3">
                        <label for="document" class="form-label" style="font-size:0.85rem; font-weight:600;">
                            Document (PDF, Image, etc) <span class="text-danger">*</span>
                        </label>
                        <input type="file" class="form-control" id="document" name="document" required>
                        <div class="invalid-feedback">Please select a file to upload.</div>
                    </div>

                    <!-- Actions -->
                    <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                        <button type="submit" class="action-btn" id="submitBtn" disabled>
                            <i class="bi bi-upload me-1"></i> Upload Document
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<style>
    .search-results {
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .search-result-item {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: background 0.2s;
    }

    .search-result-item:hover {
        background: #f7f9ff;
    }

    .search-result-item:last-child {
        border-bottom: none;
    }

    .search-result-label {
        font-size: 0.7rem;
        color: #888;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .search-result-name {
        font-weight: 600;
        color: #333;
        margin: 3px 0;
        font-size: 0.95rem;
    }

    .search-result-phone {
        font-size: 0.8rem;
        color: #666;
    }

    .input-group {
        position: relative;
    }

    #clearBtn {
        border-left: none !important;
    }

    #patientSearch:focus+#clearBtn,
    #patientSearch:not(:placeholder-shown)+#clearBtn {
        display: block !important;
    }
</style>

<script>
    // Bootstrap form validation
    function setupFormValidation() {
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function (e) {
                if (!form.checkValidity() || !document.getElementById('patient_id').value) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!document.getElementById('patient_id').value) {
                        document.getElementById('patientSearch').classList.add('is-invalid');
                    }
                }
                form.classList.add('was-validated');
            });
        }
    }

    // Patient Search Functionality
    const patientSearch = document.getElementById('patientSearch');
    const searchResults = document.getElementById('searchResults');
    const patientId = document.getElementById('patient_id');
    const familyMemberId = document.getElementById('family_member_id');
    const selectedPatientDisplay = document.getElementById('selectedPatientDisplay');
    const selectedPatientName = document.getElementById('selectedPatientName');
    const clearBtn = document.getElementById('clearBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');
    const submitBtn = document.getElementById('submitBtn');
    const searchError = document.getElementById('searchError');

    let searchTimeout;

    patientSearch.addEventListener('input', async function () {
        const query = this.value.trim();
        clearTimeout(searchTimeout);
        searchError.style.display = 'none';

        if (query.length > 0) {
            clearBtn.style.display = 'block';
        } else {
            clearBtn.style.display = 'none';
        }

        if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
        }

        searchTimeout = setTimeout(async () => {
            try {
                const response = await fetch(`/appointment/search-patients/?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.error) {
                    searchError.textContent = data.error;
                    searchError.style.display = 'block';
                    searchResults.style.display = 'none';
                    return;
                }

                if (data.results && data.results.length > 0) {
                    searchResults.innerHTML = data.results.map(result => `
                        <div class="search-result-item" data-id="${result.id}">
                            <div class="search-result-label">${result.type}</div>
                            <div class="search-result-name">${result.name}</div>
                            <div class="search-result-phone">📱 ${result.phone}</div>
                        </div>
                    `).join('');

                    searchResults.style.display = 'block';

                    document.querySelectorAll('.search-result-item').forEach(item => {
                        item.addEventListener('click', function () {
                            const rawId = this.dataset.id;
                            const name = this.querySelector('.search-result-name').textContent;
                            const type = this.querySelector('.search-result-label').textContent;

                            if (rawId.startsWith('patient_')) {
                                patientId.value = rawId.replace('patient_', '');
                                familyMemberId.value = '';
                            } else if (rawId.startsWith('family_')) {
                                familyMemberId.value = rawId.replace('family_', '');
                                // Find patient id by another fetch if needed, but the search API only returns family ID.
                                // Wait, the search_patients API doesn't return the patient ID for the family member!
                                // It just returns 'id': f"family_{fm['id']}"
                            }

                            // Let's modify the above if we need patient id. Wait, in old_data_upload, if it's family member, we don't strictly have patient ID from the form unless we provide it.
                            patientSearch.value = `${name} (${type})`;
                            selectedPatientName.textContent = `${name} (${type})`;
                            selectedPatientDisplay.style.display = 'flex';
                            searchResults.style.display = 'none';
                            submitBtn.disabled = false;
                            clearBtn.style.display = 'none';
                            patientSearch.classList.remove('is-invalid');

                            // Let's set a hidden attribute for processing
                            patientSearch.setAttribute('data-rawid', rawId);
                        });
                    });
                } else {
                    searchResults.innerHTML = `
                        <div class="search-result-item" style="text-align:center; color:#999; padding:20px;">
                            <div class="mb-2">No results found</div>
                            <a href="{% url 'doctor:add_patient' %}" class="btn btn-sm btn-primary mt-2" style="font-weight:600;">
                                <i class="bi bi-person-plus"></i> Add Patient
                            </a>
                        </div>
                    `;
                    searchResults.style.display = 'block';
                }
            } catch (error) {
                console.error('Search error:', error);
                searchError.textContent = 'Error searching patients. Please try again.';
                searchError.style.display = 'block';
                searchResults.style.display = 'none';
            }
        }, 500);
    });

    // We must handle the rawId submission correctly.
    // Let's intercept form submission to properly set patient_id and family_member_id
    document.querySelector('form').addEventListener('submit', function (e) {
        const rawId = patientSearch.getAttribute('data-rawid');
        if (rawId) {
            if (rawId.startsWith('patient_')) {
                patientId.value = rawId.replace('patient_', '');
                familyMemberId.value = '';
            } else if (rawId.startsWith('family_')) {
                familyMemberId.value = rawId.replace('family_', '');
                patientId.value = 'family_only'; // We'll handle this in the backend
            }
        }
    });

    clearBtn.addEventListener('click', function (e) {
        e.preventDefault();
        patientSearch.value = '';
        patientSearch.removeAttribute('data-rawid');
        clearBtn.style.display = 'none';
        searchResults.style.display = 'none';
    });

    clearSelectionBtn.addEventListener('click', function (e) {
        e.preventDefault();
        patientId.value = '';
        familyMemberId.value = '';
        patientSearch.value = '';
        patientSearch.removeAttribute('data-rawid');
        selectedPatientDisplay.style.display = 'none';
        submitBtn.disabled = true;
        clearBtn.style.display = 'none';
        searchResults.style.display = 'none';
        searchError.style.display = 'none';
    });

    document.addEventListener('click', function (e) {
        if (!e.target.closest('#patientSearch') && !e.target.closest('#searchResults')) {
            searchResults.style.display = 'none';
        }
    });

    document.addEventListener('DOMContentLoaded', function () {
        setupFormValidation();
    });
</script>

{% endblock %}
