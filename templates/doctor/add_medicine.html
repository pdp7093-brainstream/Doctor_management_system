{% extends "doctor/main.html" %}
{% load static %}
{% block title %}Add Medicine{% endblock %}
{% block content %}

<main class="main-content" id="mainContent">
    <div class="patient-form-shell">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h2 class="page-title mb-1">Add Medicine</h2>
                <p class="text-muted small mb-0">Add a new medicine to the store inventory.</p>
            </div>
            <a href="{% url 'medicine:manage_medicine' %}" class="patient-link-btn">
                <i class="bi bi-arrow-left me-1"></i> Medicine Store
            </a>
        </div>

        <!-- Form Card -->
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2" style="font-size:0.98rem; font-weight:700;">
                <i class="bi bi-capsule-pill"></i> Medicine Information
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'medicine:add_medicine' %}" class="row g-3">
                    {% csrf_token %}

                    <!-- Section: Basic Info -->
                    <div class="col-12">
                        <div style="font-size:0.78rem; font-weight:700; color:var(--primary-color);">
                            <i class="bi bi-info-circle"></i> Basic Info
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" style="font-size:0.85rem; font-weight:600;" for="medicine-name">
                            Medicine Name <span class="text-danger">*</span>
                        </label>
                        <input id="medicine-name" type="text" name="name" class="form-control"
                               placeholder="e.g., Paracetamol" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" style="font-size:0.85rem; font-weight:600;" for="medicine-short-name">
                            Short Name <span class="text-danger">*</span>
                        </label>
                        <input id="medicine-short-name" type="text" name="short_name" class="form-control"
                               placeholder="e.g., PCM" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" style="font-size:0.85rem; font-weight:600;" for="medicine-type">
                            Medicine Type <span class="text-danger">*</span>
                        </label>
                        <select id="medicine-type" name="medicine_type" class="form-select" required>
                            <option value="" disabled selected>Select type...</option>
                            {% for value, label in medicine_types %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" style="font-size:0.85rem; font-weight:600;" for="medicine-company">
                            Company
                        </label>
                        <input id="medicine-company" type="text" name="company" class="form-control"
                               placeholder="e.g., Sun Pharma">
                    </div>

                    <div class="col-12">
                        <label class="form-label" style="font-size:0.85rem; font-weight:600;" for="medicine-desc">
                            Description
                        </label>
                        <textarea id="medicine-desc" name="description" class="form-control"
                                  rows="2" placeholder="Optional notes about this medicine..."></textarea>
                    </div>

                    <!-- Active toggle -->
                    <div class="col-12">
                        <div class="form-check" style="margin-top:2px;">
                            <input class="form-check-input" type="checkbox" id="medicine-active" name="is_active" checked>
                            <label class="form-check-label" for="medicine-active" style="font-size:0.88rem; font-weight:600; cursor:pointer;">
                                Active <span class="fw-normal text-muted">(available in store)</span>
                            </label>
                        </div>
                    </div>

                    <!-- Section: Variants -->
                    <div class="col-12 mt-2">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div style="font-size:0.78rem; font-weight:700; color:var(--primary-color);">
                                <i class="bi bi-box-seam"></i> Variants
                                <span class="fw-normal text-muted" style="font-size:0.78rem; color:#888 !important;">(Power / Price / Stock)</span>
                            </div>
                            <button type="button" id="addVariantBtn"
                                    class="btn btn-sm"
                                    style="background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; font-size:0.82rem; border-radius:8px;">
                                <i class="bi bi-plus-circle me-1"></i> Add Variant
                            </button>
                        </div>

                        <div id="variantsContainer">
                            <!-- Default first variant row -->
                            <div class="variant-row rounded-3 p-3 mb-3" style="background:#f8fbff; border:1px solid #e2e8f0;">
                                <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:12px; align-items:end;">
                                    <div>
                                        <label style="font-size:0.78rem; font-weight:600; color:#475569; display:block; margin-bottom:4px;">Power / Strength</label>
                                        <input type="text" name="power[]" class="form-control form-control-sm" placeholder="e.g., 500mg" required>
                                    </div>
                                    <div>
                                        <label style="font-size:0.78rem; font-weight:600; color:#475569; display:block; margin-bottom:4px;">Price (₹)</label>
                                        <input type="number" name="price[]" class="form-control form-control-sm" placeholder="0.00" min="0" step="0.01" required>
                                    </div>
                                    <div>
                                        <label style="font-size:0.78rem; font-weight:600; color:#475569; display:block; margin-bottom:4px;">Stock</label>
                                        <input type="number" name="stock[]" class="form-control form-control-sm" placeholder="0" min="0" required>
                                    </div>
                                    <div>
                                        <label style="font-size:0.78rem; font-weight:600; color:#475569; display:block; margin-bottom:4px;">Low Alert</label>
                                        <input type="number" name="low_stock_alert[]" class="form-control form-control-sm" value="10" min="0">
                                    </div>
                                    <div>
                                        <button type="button" class="btn btn-sm remove-variant-btn"
                                                style="background:#fee2e2; color:#dc2626; border:1px solid #fecaca; border-radius:8px;" disabled>
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="col-12 d-flex justify-content-end mt-2">
                        <button type="submit" class="action-btn">
                            <i class="bi bi-check2-circle me-1"></i> Save Medicine
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>
<script src="{% static 'assets/js/add_medicine.js' %}"></script>
{% endblock %}
