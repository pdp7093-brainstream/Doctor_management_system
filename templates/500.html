{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - 500</title>
    <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a0a 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 40px 24px;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #ef4444, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: shake 1.5s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .error-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }
        .error-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(239, 68, 68, 0.4);
            color: #fff;
        }
        /* Background decoration */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.04;
            background: #ef4444;
        }
        .bg-circle-1 { width: 400px; height: 400px; top: -100px; right: -100px; }
        .bg-circle-2 { width: 300px; height: 300px; bottom: -80px; left: -80px; }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">
            Something went wrong on our end. Our team has been notified. 
            Please try again later or go back to the homepage.
        </p>
        <button onclick="history.back()" class="error-btn">
            <i class="bi bi-arrow-left"></i> Go Back
        </button>
        <div style="margin-top: 16px;">
            <a href="/" style="color: #64748b; font-size: 0.9rem; text-decoration: underline;">or go to Homepage</a>
        </div>
    </div>
</body>
</html>
