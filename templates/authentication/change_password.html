{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Clinic</title>

    <!-- Bootstrap -->
    <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .auth-header {
            background: #4183ff;
            color: white;
            padding: 35px 25px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-header p {
            font-size: 0.92rem;
            opacity: 0.9;
            margin-bottom: 0;
        }

        .auth-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #4183ff;
            box-shadow: 0 0 0 3px rgba(65, 131, 255, 0.1);
        }

        .btn-update {
            background: #0f62fb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        .btn-update:hover {
            background: #1b90e3;
            color: #eaf4ff;
        }

        .message-box {
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 18px;
        }

        .message-success {
            background: #edfdf3;
            border-left: 4px solid #198754;
            color: #198754;
        }

        .message-error {
            background: #fff0f0;
            border-left: 4px solid #dc3545;
            color: #dc3545;
        }

        .field-error {
            font-size: 0.8rem;
            color: #dc3545;
            margin-top: -10px;
            margin-bottom: 12px;
            display: block;
        }

        .auth-footer {
            background: #fdfdfd;
            border-top: 1px solid #eee;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .auth-footer a {
            color: #4183ff;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            color: #1b90e3;
            text-decoration: underline;
        }

        .password-toggle-wrapper {
            position: relative;
        }

        .password-toggle-wrapper input {
            padding-right: 3rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.85rem;
            top: 0;
            bottom: 0;
            margin: auto 0;
            background: transparent;
            border: none;
            color: #4183ff;
            cursor: pointer;
            padding: 0.35rem;
            font-size: 1rem;
            line-height: 1;
            height: 1.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #1b6be0;
        }
    </style>
</head>

<body>

    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <h2>Change Password </h2>
            <p>Update your account password securely</p>
        </div>

        <!-- Body -->
        <div class="auth-body">

                        <!-- Django Messages -->
                        
            {% if messages %}
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script>
                document.addEventListener("DOMContentLoaded", function() {
                    {% for message in messages %}
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: '{% if message.tags == "error" %}error{% elif message.tags == "warning" %}warning{% elif message.tags == "info" %}info{% else %}success{% endif %}',
                            title: '{{ message|escapejs }}',
                            showConfirmButton: false,
                            timer: 3000,
                            timerProgressBar: true,
                        });
                    {% endfor %}
                });
            </script>
            {% endif %}


            <form method="POST" novalidate>
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-2 password-toggle-wrapper">

                        <label class="form-label">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.errors %}
                            <small class="field-error">
                                {{ field.errors.0 }}
                            </small>
                        {% endif %}

                    </div>
                {% endfor %}

                <!-- Submit -->
                <button type="submit" class="btn btn-update shadow-sm">
                    Update Password
                </button>

            </form>

            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const eyeOpenSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M16 8s-3.5-5.5-8-5.5S0 8 0 8s3.5 5.5 8 5.5S16 8 16 8zm-8 4A4 4 0 1 1 8 4a4 4 0 0 1 0 8z"/><path d="M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>';
                    const eyeSlashSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M13.359 11.238l1.287 1.287a.5.5 0 0 1-.708.708l-1.26-1.26A7.488 7.488 0 0 1 8 13.5C4.5 13.5 1.8 10.1 1 8a7.506 7.506 0 0 1 2.22-2.912L1.854 3.5a.5.5 0 1 1 .708-.708l1.285 1.285A7.485 7.485 0 0 1 8 2.5c3.5 0 6.2 3.4 7 5.5a7.485 7.485 0 0 1-1.641 3.238z"/><path d="M10.478 11.178A3.998 3.998 0 0 1 4.822 6.522l.738.738a3 3 0 0 0 4.125 4.125l.793.793zm.7-2.017L6.04 5.023A3 3 0 0 1 10.478 9.16z"/></svg>';

                    document.querySelectorAll('.password-toggle-wrapper').forEach(function(wrapper) {
                        var input = wrapper.querySelector('input[type="password"]');
                        if (!input) return;
                        var button = document.createElement('button');
                        button.type = 'button';
                        button.className = 'password-toggle';
                        button.innerHTML = eyeOpenSVG;
                        button.setAttribute('aria-label', 'Toggle password visibility');
                        wrapper.appendChild(button);

                        button.addEventListener('click', function() {
                            if (input.type === 'password') {
                                input.type = 'text';
                                button.innerHTML = eyeSlashSVG;
                            } else {
                                input.type = 'password';
                                button.innerHTML = eyeOpenSVG;
                            }
                        });
                    });
                });
            </script>

        </div>

        <!-- Footer -->
        <div class="auth-footer">
            Back to <a href="{% url 'login'%}">login</a>
        </div>

    </div>

</body>

</html>
