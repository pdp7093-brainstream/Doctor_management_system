{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic</title>
    <!-- Bootstrap for Utility Classes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .auth-header {
            background: #4183ff; /* Purple color from image */
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .auth-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .btn-login {
            background: #0f62fb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1b90e3;
            color: rgb(196, 207, 215);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: #4183ff;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .auth-footer {
            background: #fdfdfd;
            border-top: 1px solid #eee;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .auth-footer a {
            color: #4183ff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <!-- Purple Header Section -->
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to your clinic account</p>
        </div>

        <div class="auth-body">
            {% if error %}
            <div class="alert alert-danger py-2 text-center" style="font-size: 0.8rem;">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-1">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="Enter phone number" required>
                </div>

                <div class="mb-1">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <a href="{% url 'resetpass' %}" class="forgot-link">Forgot Password?</a>

                <button type="submit" class="btn btn-login shadow-sm">Login</button>
            </form>
        </div>

        <!-- Footer Section (Contact Admin) -->
        <div class="auth-footer">
            If you are Doctor, <a href="{% url 'doctor:login' %}">login</a> here
        </div>
    </div>

</body>

</html>
