{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic</title>
    <!-- Bootstrap for Utility Classes -->
    <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .auth-header {
            background: #4183ff;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .auth-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .form-control:focus {
            border-color: #4183ff;
            box-shadow: 0 0 0 3px rgba(65, 131, 255, 0.1);
        }

        .btn-login {
            background: #0f62fb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1b90e3;
            color: rgb(196, 207, 215);
        }

        .auth-footer {
            background: #fdfdfd;
            border-top: 1px solid #eee;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .auth-footer a {
            color: #4183ff;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link {
            color: #4183ff;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }

        .signup-link:hover {
            text-decoration: underline;
            color: #1b90e3;
        }

        .error-message {
            background: #fee;
            border-left: 4px solid #c33;
            color: #c33;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .helper-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <!-- Header Section -->
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to your clinic account</p>
        </div>

        <div class="auth-body">
            <!-- Error Message -->
            {% if error %}
            <div class="error-message">
                <strong>Login Failed:</strong> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" novalidate>
                {% csrf_token %}

                <!-- Phone Number Field -->
                <div class="mb-3">
                    <label class="form-label" for="phone">Phone Number</label> <span class="helper-text">Format: 1234567890 </span>
                    <input 
                        type="tel" 
                        id="phone"
                        name="phone" 
                        class="form-control" 
                        placeholder="9876543210"
                        pattern="[0-9\s\-\+\(\)]+"
                        title="Enter a valid phone number (10-15 digits)"
                        required
                        autocomplete="tel"
                    >
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        class="form-control" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-login shadow-sm">
                    Login
                </button>

                <!-- Sign Up Link -->
                <p class="text-center mt-3 mb-0" style="font-size: 0.9rem;">
                    Not registered?
                    <a href="{% url 'signup' %}" class="signup-link">Sign Up</a>
                </p>
            </form>
        </div>

        <!-- Footer Section -->
        <div class="auth-footer">
            If you are Doctor, <a href="{% url 'doctor:login' %}">Login</a> here
        </div>
    </div>

</body>

</html>
