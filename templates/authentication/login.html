{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic</title>
    <!-- Bootstrap for Utility Classes -->
    <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/bootstrap-icons/font/bootstrap-icons.css' %}">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .auth-header {
            background: #4183ff;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .auth-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .form-control:focus {
            border-color: #4183ff;
            box-shadow: 0 0 0 3px rgba(65, 131, 255, 0.1);
        }

        .btn-login {
            background: #0f62fb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1b90e3;
            color: rgb(196, 207, 215);
        }

        .auth-footer {
            background: #fdfdfd;
            border-top: 1px solid #eee;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .auth-footer a {
            color: #4183ff;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link {
            color: #4183ff;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }

        .signup-link:hover {
            text-decoration: underline;
            color: #1b90e3;
        }

        .error-message {
            background: #fee;
            border-left: 4px solid #c33;
            color: #c33;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .helper-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
            display: block;
        }

        .password-toggle-wrapper {
            position: relative;
        }

        .password-toggle-wrapper .form-control {
            padding-right: 3rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.85rem;
            top: 0;
            bottom: 0;
            margin: auto 0;
            background: transparent;
            border: none;
            color: #4183ff;
            cursor: pointer;
            padding: 0.35rem;
            font-size: 1rem;
            line-height: 1;
            height: 1.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #1b6be0;
        }

        .password-toggle:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <!-- Header Section -->
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to your clinic account</p>
        </div>

        <div class="auth-body">
            <!-- Error Message -->
            {% if error %}
            <div class="error-message">
                <strong>Login Failed:</strong> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" novalidate>
                {% csrf_token %}

                <!-- Phone Number Field -->
                <div class="mb-3">
                    <label class="form-label" for="phone">Phone Number</label> <span class="helper-text">Format: 1234567890 </span>
                    <input 
                        type="tel" 
                        id="phone"
                        name="phone" 
                        class="form-control" 
                        placeholder="9876543210"
                        pattern="[0-9\s\-\+\(\)]+"
                        title="Enter a valid phone number (10-15 digits)"
                        required
                        autocomplete="tel"
                    >
                </div>

                <!-- Password Field -->
                <div class="mb-3 password-toggle-wrapper">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        class="form-control" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
                            <path d="M16 8s-3.5-5.5-8-5.5S0 8 0 8s3.5 5.5 8 5.5S16 8 16 8zm-8 4A4 4 0 1 1 8 4a4 4 0 0 1 0 8z"/>
                            <path d="M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
                        </svg>
                    </button>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-login shadow-sm">
                    Login
                </button>

                <!-- Sign Up Link -->
                <p class="text-center mt-3 mb-0" style="font-size: 0.9rem;">
                    Not registered?
                    <a href="{% url 'signup' %}" class="signup-link">Sign Up</a>
                </p>
            </form>
        </div>

        <!-- Footer Section -->
        <div class="auth-footer">
            If you are Doctor, <a href="{% url 'doctor:login' %}">Login</a> here
        </div>
    </div>

    <script>
        const eyeOpenSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M16 8s-3.5-5.5-8-5.5S0 8 0 8s3.5 5.5 8 5.5S16 8 16 8zm-8 4A4 4 0 1 1 8 4a4 4 0 0 1 0 8z"/><path d="M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>';
        const eyeSlashSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M13.359 11.238l1.287 1.287a.5.5 0 0 1-.708.708l-1.26-1.26A7.488 7.488 0 0 1 8 13.5C4.5 13.5 1.8 10.1 1 8a7.506 7.506 0 0 1 2.22-2.912L1.854 3.5a.5.5 0 1 1 .708-.708l1.285 1.285A7.485 7.485 0 0 1 8 2.5c3.5 0 6.2 3.4 7 5.5a7.485 7.485 0 0 1-1.641 3.238z"/><path d="M10.478 11.178A3.998 3.998 0 0 1 4.822 6.522l.738.738a3 3 0 0 0 4.125 4.125l.793.793zm.7-2.017L6.04 5.023A3 3 0 0 1 10.478 9.16z"/></svg>';

        document.querySelectorAll('.password-toggle-wrapper').forEach(function(wrapper) {
            var input = wrapper.querySelector('input[type="password"]');
            var button = wrapper.querySelector('.password-toggle');
            if (!input || !button) return;
            button.addEventListener('click', function() {
                if (input.type === 'password') {
                    input.type = 'text';
                    button.innerHTML = eyeSlashSVG;
                } else {
                    input.type = 'password';
                    button.innerHTML = eyeOpenSVG;
                }
            });
        });
    </script>

</body>

</html>
