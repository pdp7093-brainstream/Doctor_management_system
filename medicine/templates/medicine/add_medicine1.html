{% extends "doctor/main.html" %}
{% load static %}
{% block title %}Add Medicine - Doctor Dashboard{% endblock %}
{% block content %}
<main class="main-content" id="mainContent">
    <div class="patient-form-shell">
        <div class="page-header patient-form-header">
            <div>
                <h2 class="page-title mb-0">Add Medicine</h2>
                <p class="page-subtitle">Add a new medicine to the store inventory.</p>
            </div>
            <a href="{% url 'medicine:manage_medicine' %}" class="patient-link-btn">
                Medicine Store
            </a>
        </div>

        <div class="patient-form-card">
            <form method="POST" action="{% url 'medicine:add_medicine' %}" class="patient-form-grid">
                {% csrf_token %}

                <!-- Row 1: Medicine Name + Short Name -->
                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-name">Medicine Name</label>
                        <input id="medicine-name" type="text" name="name" class="patient-input"
                            placeholder="e.g., Paracetamol" required>
                    </div>
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-short-name">Short Name</label>
                        <input id="medicine-short-name" type="text" name="short_name" class="patient-input"
                            placeholder="e.g., PCM" required>
                    </div>
                </div>

                <!-- Row 2: Medicine Type + Company -->
                <div class="patient-form-row">
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-type">Medicine Type</label>
                        <select id="medicine-type" name="medicine_type" class="patient-input" required>
                            <option value="" disabled selected>Select type...</option>
                            {% for value, label in medicine_types %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="patient-field">
                        <label class="patient-label" for="medicine-company">Company</label>
                        <input id="medicine-company" type="text" name="company" class="patient-input"
                            placeholder="e.g., Sun Pharma">
                    </div>
                </div>

                <!-- Description -->
                <div class="patient-field">
                    <label class="patient-label" for="medicine-desc">Description</label>
                    <textarea id="medicine-desc" name="description" class="patient-input"
                        rows="2" placeholder="Optional notes..."></textarea>
                </div>

                <!-- Is Active -->
                <div class="patient-field" style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="medicine-active" name="is_active" checked
                        style="width:18px; height:18px; cursor:pointer;">
                    <label class="patient-label mb-0" for="medicine-active" style="cursor:pointer;">
                        Active (available in store)
                    </label>
                </div>

                <!-- Variants Section -->
                <div style="margin-top:8px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <label class="patient-label mb-0">
                            Variants
                            <span style="font-weight:400; font-size:0.82rem; color:#888;">
                                (Power / Cost / Selling / Stock / Unit / Dates)
                            </span>
                        </label>
                        <button type="button" id="addVariantBtn" class="btn btn-sm btn-outline-primary"
                            style="border-radius:8px; font-size:0.82rem;">
                            <i class="bi bi-plus-circle"></i> Add Variant
                        </button>
                    </div>

                    <div id="variantsContainer">
                        <!-- Default first variant row -->
                        <div class="variant-row" style="background:#f8fbff; border:1px solid #e2e8f0; border-radius:10px; padding:14px; margin-bottom:12px;">
                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:10px; margin-bottom:10px;">
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Power / Strength</label>
                                    <input type="text" name="power[]" class="patient-input"
                                        placeholder="e.g., 500mg" required>
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Cost Price (₹)</label>
                                    <input type="number" name="cost_price[]" class="patient-input"
                                        placeholder="0.00" min="0" step="0.01" required>
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Selling Price (₹)</label>
                                    <input type="number" name="selling_price[]" class="patient-input"
                                        placeholder="0.00" min="0" step="0.01" required>
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Stock</label>
                                    <input type="number" name="stock[]" class="patient-input"
                                        placeholder="0" min="0" required>
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Low Alert</label>
                                    <input type="number" name="low_stock_alert[]" class="patient-input"
                                        value="10" min="0">
                                </div>
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:10px; align-items:end;">
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Unit</label>
                                    <select name="unit[]" class="patient-input">
                                        {% for value, label in unit_choices %}
                                            <option value="{{ value }}">{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Unit/Strip</label>
                                    <input type="number" name="unit_per_strip[]" class="patient-input"
                                        placeholder="e.g., 10" min="1">
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Mfg Date</label>
                                    <input type="date" name="mfg_date[]" class="patient-input">
                                </div>
                                <div>
                                    <label class="patient-label" style="font-size:0.78rem;">Exp Date</label>
                                    <input type="date" name="exp_date[]" class="patient-input">
                                </div>
                                <div style="padding-bottom:2px;">
                                    <button type="button" class="btn btn-sm btn-outline-danger remove-variant-btn"
                                        style="border-radius:8px;" disabled>
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="patient-form-actions">
                    <button type="submit" class="patient-submit-btn">
                        <i class="bi bi-check2-circle"></i>
                        <span>Save Medicine</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    const variantsContainer = document.getElementById('variantsContainer');
    const addVariantBtn     = document.getElementById('addVariantBtn');

    // Unit choices from Django
    const unitOptions = `{% for value, label in unit_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}`;

    function updateRemoveBtns() {
        const rows = variantsContainer.querySelectorAll('.variant-row');
        rows.forEach(row => {
            const btn = row.querySelector('.remove-variant-btn');
            btn.disabled = rows.length === 1;
        });
    }

    function attachRemoveListener(row) {
        row.querySelector('.remove-variant-btn').addEventListener('click', function () {
            row.remove();
            updateRemoveBtns();
        });
    }

    variantsContainer.querySelectorAll('.variant-row').forEach(attachRemoveListener);

    addVariantBtn.addEventListener('click', function () {
        const row = document.createElement('div');
        row.className = 'variant-row';
        row.style.cssText = 'background:#f8fbff; border:1px solid #e2e8f0; border-radius:10px; padding:14px; margin-bottom:12px;';
        row.innerHTML = `
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:10px; margin-bottom:10px;">
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Power / Strength</label>
                    <input type="text" name="power[]" class="patient-input" placeholder="e.g., 250mg" required>
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Cost Price (₹)</label>
                    <input type="number" name="cost_price[]" class="patient-input" placeholder="0.00" min="0" step="0.01" required>
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Selling Price (₹)</label>
                    <input type="number" name="selling_price[]" class="patient-input" placeholder="0.00" min="0" step="0.01" required>
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Stock</label>
                    <input type="number" name="stock[]" class="patient-input" placeholder="0" min="0" required>
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Low Alert</label>
                    <input type="number" name="low_stock_alert[]" class="patient-input" value="10" min="0">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:10px; align-items:end;">
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Unit</label>
                    <select name="unit[]" class="patient-input">${unitOptions}</select>
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Unit/Strip</label>
                    <input type="number" name="unit_per_strip[]" class="patient-input" placeholder="e.g., 10" min="1">
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Mfg Date</label>
                    <input type="date" name="mfg_date[]" class="patient-input">
                </div>
                <div>
                    <label class="patient-label" style="font-size:0.78rem;">Exp Date</label>
                    <input type="date" name="exp_date[]" class="patient-input">
                </div>
                <div style="padding-bottom:2px;">
                    <button type="button" class="btn btn-sm btn-outline-danger remove-variant-btn" style="border-radius:8px;">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>`;

        variantsContainer.appendChild(row);
        attachRemoveListener(row);
        updateRemoveBtns();
    });
</script>
{% endblock %}
